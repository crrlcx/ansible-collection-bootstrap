---
# tasks file for sysctl

- name: Get facts
  ansible.builtin.setup: # aka gather_facts
    gather_subset:
      - "hardware"
    filter: "ansible_*_mb"

- name: Delete sysctl file when 'force'
  ansible.builtin.file:
    name: "{{ sysctl_file }}"
    state: absent
  when:
    - sysctl_force

- name: Apply sysctl options step by step
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    reload: "{{ sysctl_reload }}"
    sysctl_file: "{{ sysctl_file }}"
    sysctl_set: "{{ sysctl_set }}"
    state: present
  with_dict: "{{ sysctl_vars | combine(sysctl_vars_override) }}"
