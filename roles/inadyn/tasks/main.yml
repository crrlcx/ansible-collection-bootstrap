---
# Variables
- name: Load a variable file based on the OS type, or a default if not found.
  ansible.builtin.include_vars: "{{ lookup('ansible.builtin.first_found', params) }}"
  vars:
    params:
      files:
        - "{{ ansible_distribution_release | lower }}.yml"
        - default.yml
      paths:
        - "vars/{{ ansible_os_family | lower }}"

- name: Install inadyn
  ansible.builtin.apt:
    name:
      - "inadyn={{ inadyn_version }}*"
    allow_downgrade: true
    update_cache: true
    cache_valid_time: 3600
    state: present
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Deploy the configuration
  ansible.builtin.template:
    src: inadyn.conf.j2
    dest: "{{ inadyn_config_path }}"
    owner: root
    group: debian-inadyn
    mode: "0640"
  notify: restart inadyn

- name: Test the configuration
  ansible.builtin.command:
    cmd: inadyn --check-config -f "{{ inadyn_config_path }}"
  changed_when: false

- name: Enable inadyn daemon
  ansible.builtin.lineinfile:
    regexp: "^RUN_DAEMON="
    line: 'RUN_DAEMON="yes"'
    path: /etc/default/inadyn
  notify: restart inadyn
