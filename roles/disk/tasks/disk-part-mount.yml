---
- name: Get UUID
  ansible.builtin.command: |
    blkid -s UUID -o value {{ part.name | d(item.disk + (part_index + 1) | string) }}
  changed_when: false
  check_mode: false
  register: part_blkid

- name: Mount partition
  ansible.posix.mount:
    src: "UUID={{ part_blkid.stdout }}"
    path: "{{ part.mount }}"
    fstype: "{{ part.fstype }}"
    opts: "{{ part.mount_options | d(omit) }}"
    passno: "0"
    state: "{{ part.mount_state | d('mounted') }}"
  when:
    - part_blkid.rc == 0
    - part_blkid.stdout | length > 0

- name: Ensure the permissions are set correctly after mount
  ansible.builtin.file:
    path: "{{ part.mount }}"
    state: directory
    owner: "{{ part.user | d('root') }}"
    group: "{{ part.group | d('root') }}"
    mode: "{{ part.mode | d('0755') }}"
  when:
    - part_blkid.rc == 0
    - part_blkid.stdout | length > 0
