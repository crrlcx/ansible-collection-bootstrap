---
- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ hosts_hostname }}"
  when:
    - hosts_hostname | length > 0

- name: Update /etc/hosts
  ansible.builtin.template:
    src: hosts.j2
    dest: /etc/hosts
    backup: false
    owner: root
    group: root
    mode: "0644"
  when:
    - hosts_hostname | length > 0
    - hosts_hostname_fqdn | length > 0

- name: Gathering facts
  ansible.builtin.setup: # aka gather_facts
