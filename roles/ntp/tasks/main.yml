---
- name: Install fresh tzdata
  ansible.builtin.apt:
    name:
      - tzdata
      - systemd-timesyncd
    state: present
    install_recommends: true
    update_cache: true
    cache_valid_time: 3600
  environment:
    DEBIAN_FRONTEND: noninteractive
  check_mode: false

- name: Set timezone
  community.general.timezone:
    name: "{{ timezone }}"
    hwclock: UTC
  notify:
    - update timezone

- name: Update config /etc/systemd/timesyncd.conf
  ansible.builtin.template:
    src: timesyncd.conf.j2
    dest: /etc/systemd/timesyncd.conf
    force: true
    owner: root
    group: root
    mode: "0644"
  notify:
    - restart systemd-timesyncd
  when:
    - ntp_servers is defined
    - ntp_servers | length > 0

- name: Ensure ntp handlers are flushed
  ansible.builtin.meta: flush_handlers
